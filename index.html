<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <title>Gastos Mensuales</title>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --success: #34a853;
      --danger: #ea4335;
      --warn: #fbbc04;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --paid-bg: #e6f4ea;
      --paid-border: #34a853;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 68px;
      z-index: 99;
    }
    .month-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: #e8f0fe; }
    .month-label { font-weight: 600; font-size: 1rem; text-transform: capitalize; }

    /* TABS */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* CONTENT */
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* SUMMARY CARD */
    .summary-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(26,115,232,0.3);
    }
    .summary-card .label { font-size: 0.8rem; opacity: 0.85; margin-bottom: 4px; }
    .summary-card .total { font-size: 2rem; font-weight: 700; }
    .summary-card .sub { display: flex; gap: 16px; margin-top: 12px; }
    .summary-card .sub-item { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 12px; flex: 1; text-align: center; }
    .summary-card .sub-item .n { font-size: 1.2rem; font-weight: 700; }
    .summary-card .sub-item .l { font-size: 0.7rem; opacity: 0.85; margin-top: 2px; }

    /* SERVICE LIST */
    .service-item {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 2px solid var(--border);
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .service-item.paid {
      background: var(--paid-bg);
      border-color: var(--paid-border);
    }
    .service-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .service-icon {
      font-size: 1.5rem;
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }
    .service-info { flex: 1; min-width: 0; }
    .service-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .service-amount-display {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .service-item.paid .service-amount-display {
      color: var(--success);
      font-weight: 500;
    }
    .check-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .check-btn.paid-btn {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    /* AMOUNT INPUT AREA */
    .amount-area {
      margin-top: 12px;
      display: none;
    }
    .amount-area.visible { display: flex; gap: 8px; align-items: center; }
    .amount-input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--primary);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text);
      outline: none;
    }
    .amount-input:focus { border-color: var(--primary-dark); }
    .save-btn {
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .save-btn:active { background: var(--primary-dark); }

    /* DELETE BUTTON */
    .service-actions { display: flex; align-items: center; gap: 6px; }
    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: #fce8e6; color: var(--danger); }

    /* ADD SERVICE */
    .add-section {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
      border: 2px dashed var(--border);
    }
    .add-section h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; }
    .add-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .add-row input, .add-row select {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      background: white;
    }
    .add-row input:focus, .add-row select:focus { border-color: var(--primary); }
    .add-btn {
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* COMPARISON TAB */
    .comparison-month {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .comparison-month h3 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: capitalize;
      margin-bottom: 12px;
      color: var(--primary);
    }
    .comp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--bg);
      font-size: 0.9rem;
    }
    .comp-row:last-child { border-bottom: none; }
    .comp-row .comp-name { color: var(--muted); }
    .comp-row .comp-amount { font-weight: 600; }
    .comp-row .comp-amount.paid-amt { color: var(--success); }
    .comp-row .comp-amount.unpaid-amt { color: var(--muted); }
    .comp-total {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 2px solid var(--border);
      font-weight: 700;
      font-size: 1rem;
    }
    .bar-container { margin-top: 8px; }
    .bar-bg { background: var(--bg); border-radius: 8px; height: 8px; overflow: hidden; }
    .bar-fill { background: var(--primary); height: 100%; border-radius: 8px; transition: width 0.4s ease; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 6px;
    }
    .badge-paid { background: #e6f4ea; color: var(--success); }
    .badge-pending { background: #fce8e6; color: var(--danger); }

    @media (max-width: 400px) {
      .summary-card .total { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 Gastos Mensuales</h1>
  <p>Seguimiento de servicios y pagos</p>
</header>

<div class="month-nav">
  <button onclick="changeMonth(-1)" title="Mes anterior">‹</button>
  <span class="month-label" id="monthLabel"></span>
  <button onclick="changeMonth(1)" title="Mes siguiente">›</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('servicios', this)">📋 Servicios</div>
  <div class="tab" onclick="switchTab('comparacion', this)">📊 Comparación</div>
</div>

<div class="content">

  <!-- TAB SERVICIOS -->
  <div id="tab-servicios">
    <div class="summary-card">
      <div class="label">Total del mes</div>
      <div class="total" id="totalMes">$0</div>
      <div class="sub">
        <div class="sub-item">
          <div class="n" id="countPaid">0</div>
          <div class="l">Pagados</div>
        </div>
        <div class="sub-item">
          <div class="n" id="countPending">0</div>
          <div class="l">Pendientes</div>
        </div>
        <div class="sub-item">
          <div class="n" id="totalPaid">$0</div>
          <div class="l">Pagado</div>
        </div>
      </div>
    </div>

    <div id="serviceList"></div>

    <div class="add-section">
      <h3>➕ Agregar servicio</h3>
      <div class="add-row">
        <select id="newIcon">
          <option value="📦">📦 Otro</option>
          <option value="⚡">⚡ Electricidad</option>
          <option value="🔥">🔥 Gas</option>
          <option value="🌐">🌐 Internet</option>
          <option value="📱">📱 Celular/Datos</option>
          <option value="🏛️">🏛️ Municipal/Gobierno</option>
          <option value="💳">💳 Tarjeta</option>
          <option value="🚗">🚗 Auto</option>
          <option value="💧">💧 Agua</option>
          <option value="⚽">⚽ Deporte/Club</option>
          <option value="🏠">🏠 Hogar</option>
          <option value="📺">📺 Streaming</option>
          <option value="🏥">🏥 Salud</option>
          <option value="📚">📚 Educación</option>
        </select>
      </div>
      <div class="add-row">
        <input type="text" id="newName" placeholder="Nombre del servicio" maxlength="40" />
        <button class="add-btn" onclick="addService()">Agregar</button>
      </div>
    </div>
  </div>

  <!-- TAB COMPARACION -->
  <div id="tab-comparacion" style="display:none">
    <div id="compContent"></div>
  </div>

</div>

<script>
  // ─── ESTADO ────────────────────────────────────────────────────────────────
  const DEFAULT_SERVICES = [
    { id: 'luz',       name: 'Luz',                  icon: '⚡' },
    { id: 'gas',       name: 'Gas',                  icon: '🔥' },
    { id: 'internet',  name: 'Internet',              icon: '🌐' },
    { id: 'datos',     name: 'Datos Móviles',         icon: '📱' },
    { id: 'monotrib',  name: 'Monotributo',           icon: '🏛️' },
    { id: 'futbol',    name: 'Fútbol (hijo)',          icon: '⚽' },
    { id: 'uala',      name: 'Tarjeta Ualá',          icon: '💳' },
    { id: 'mercadopago', name: 'Tarjeta MercadoPago', icon: '💳' },
    { id: 'municipal', name: 'Municipales',            icon: '🏛️' },
    { id: 'patente',   name: 'Patente Auto',           icon: '🚗' },
    { id: 'agua',      name: 'Agua Corriente',         icon: '💧' },
    { id: 'bidon',     name: 'Agua en Bidón',          icon: '🫙' },
  ];

  let currentDate = new Date();
  currentDate.setDate(1);

  function getMonthKey(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
  }

  function getData() {
    return JSON.parse(localStorage.getItem('gastosData') || '{}');
  }

  function saveData(data) {
    localStorage.setItem('gastosData', JSON.stringify(data));
  }

  function getServices() {
    return JSON.parse(localStorage.getItem('services') || JSON.stringify(DEFAULT_SERVICES));
  }

  function saveServices(services) {
    localStorage.setItem('services', JSON.stringify(services));
  }

  // ─── NAVEGACIÓN ────────────────────────────────────────────────────────────
  function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);
    render();
  }

  function getMonthLabel(date) {
    return date.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
  }

  // ─── RENDER PRINCIPAL ──────────────────────────────────────────────────────
  function render() {
    document.getElementById('monthLabel').textContent = getMonthLabel(currentDate);
    renderServices();
    const compTab = document.getElementById('tab-comparacion');
    if (compTab.style.display !== 'none') renderComparison();
  }

  // ─── SERVICIOS ─────────────────────────────────────────────────────────────
  function renderServices() {
    const key = getMonthKey(currentDate);
    const data = getData();
    const monthData = data[key] || {};
    const services = getServices();

    const list = document.getElementById('serviceList');
    list.innerHTML = '';

    let total = 0, paid = 0, pending = 0, paidTotal = 0;

    services.forEach(svc => {
      const entry = monthData[svc.id] || { paid: false, amount: '' };
      const amount = parseFloat(entry.amount) || 0;
      total += amount;
      if (entry.paid) { paid++; paidTotal += amount; } else { pending++; }

      const div = document.createElement('div');
      div.className = 'service-item' + (entry.paid ? ' paid' : '');
      div.innerHTML = `
        <div class="service-row">
          <div class="service-icon">${svc.icon}</div>
          <div class="service-info">
            <div class="service-name">${svc.name}</div>
            <div class="service-amount-display">
              ${entry.paid
                ? (amount > 0 ? '✓ $' + amount.toLocaleString('es-AR') : '✓ Pagado')
                : (amount > 0 ? '$' + amount.toLocaleString('es-AR') + ' — pendiente' : 'Sin monto')}
            </div>
          </div>
          <div class="service-actions">
            <button class="delete-btn" onclick="deleteService('${svc.id}')" title="Eliminar">🗑️</button>
            <button class="check-btn ${entry.paid ? 'paid-btn' : ''}"
              onclick="togglePaid('${svc.id}')">${entry.paid ? '✓' : '○'}</button>
          </div>
        </div>
        <div class="amount-area ${!entry.paid ? 'visible' : ''}" id="area-${svc.id}">
          <input class="amount-input" type="number" inputmode="decimal" placeholder="Monto ($)"
            id="amt-${svc.id}" value="${entry.amount || ''}" onkeydown="if(event.key==='Enter')saveAmount('${svc.id}')" />
          <button class="save-btn" onclick="saveAmount('${svc.id}')">Guardar</button>
        </div>
      `;
      list.appendChild(div);
    });

    document.getElementById('totalMes').textContent = '$' + total.toLocaleString('es-AR');
    document.getElementById('countPaid').textContent = paid;
    document.getElementById('countPending').textContent = pending;
    document.getElementById('totalPaid').textContent = '$' + paidTotal.toLocaleString('es-AR');
  }

  function togglePaid(id) {
    const key = getMonthKey(currentDate);
    const data = getData();
    if (!data[key]) data[key] = {};
    const entry = data[key][id] || { paid: false, amount: '' };

    // Grab current input value before toggling
    const inputEl = document.getElementById('amt-' + id);
    if (inputEl && inputEl.value) entry.amount = inputEl.value;

    entry.paid = !entry.paid;
    data[key][id] = entry;
    saveData(data);
    renderServices();
  }

  function saveAmount(id) {
    const key = getMonthKey(currentDate);
    const data = getData();
    if (!data[key]) data[key] = {};
    const entry = data[key][id] || { paid: false, amount: '' };
    const val = document.getElementById('amt-' + id).value;
    entry.amount = val;
    data[key][id] = entry;
    saveData(data);
    renderServices();
    // re-focus after re-render if not paid
    const newInput = document.getElementById('amt-' + id);
    if (newInput) newInput.focus();
  }

  function addService() {
    const name = document.getElementById('newName').value.trim();
    const icon = document.getElementById('newIcon').value;
    if (!name) { document.getElementById('newName').focus(); return; }
    const services = getServices();
    const id = 'custom_' + Date.now();
    services.push({ id, name, icon });
    saveServices(services);
    document.getElementById('newName').value = '';
    renderServices();
  }

  function deleteService(id) {
    if (!confirm('¿Eliminar este servicio?')) return;
    let services = getServices();
    services = services.filter(s => s.id !== id);
    saveServices(services);
    renderServices();
  }

  // ─── COMPARACIÓN ───────────────────────────────────────────────────────────
  function renderComparison() {
    const data = getData();
    const services = getServices();
    const container = document.getElementById('compContent');

    // Build last 6 months (most recent first)
    const months = [];
    const d = new Date();
    d.setDate(1);
    for (let i = 0; i < 6; i++) {
      months.push(new Date(d));
      d.setMonth(d.getMonth() - 1);
    }

    // Compute totals per month for bar scaling
    const totals = months.map(m => {
      const key = getMonthKey(m);
      const md = data[key] || {};
      return services.reduce((sum, svc) => sum + (parseFloat((md[svc.id] || {}).amount) || 0), 0);
    });
    const maxTotal = Math.max(...totals, 1);

    container.innerHTML = '';

    months.forEach((m, i) => {
      const key = getMonthKey(m);
      const md = data[key] || {};
      const label = m.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
      const total = totals[i];
      const pct = Math.round((total / maxTotal) * 100);

      const rows = services.map(svc => {
        const entry = md[svc.id] || {};
        const amt = parseFloat(entry.amount) || 0;
        const isPaid = entry.paid;
        return `<div class="comp-row">
          <span class="comp-name">${svc.icon} ${svc.name}</span>
          <span class="comp-amount ${isPaid ? 'paid-amt' : 'unpaid-amt'}">
            ${amt > 0 ? '$' + amt.toLocaleString('es-AR') : '—'}${isPaid ? ' ✓' : ''}
          </span>
        </div>`;
      }).join('');

      const card = document.createElement('div');
      card.className = 'comparison-month';
      card.innerHTML = `
        <h3>${label} ${i === 0 ? '<span class="badge badge-paid">Este mes</span>' : ''}</h3>
        <div class="bar-container">
          <div class="bar-label">
            <span>Total pagado</span><span>$${total.toLocaleString('es-AR')}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>
        ${rows}
        <div class="comp-total"><span>Total</span><span>$${total.toLocaleString('es-AR')}</span></div>
      `;
      container.appendChild(card);
    });

    if (Object.keys(data).length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>Todavía no hay datos registrados.<br>Empezá cargando los montos del mes actual.</p></div>`;
    }
  }

  // ─── TABS ──────────────────────────────────────────────────────────────────
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-servicios').style.display = tab === 'servicios' ? '' : 'none';
    document.getElementById('tab-comparacion').style.display = tab === 'comparacion' ? '' : 'none';
    if (tab === 'comparacion') renderComparison();
  }

  // ─── INIT ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
